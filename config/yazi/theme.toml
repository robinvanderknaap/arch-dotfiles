[manager]
cwd = { fg = "#89b4fa" }

hovered         = { fg = "#1e1e2e", bg = "#cba6f7" }
preview_hovered = { underline = true }

find_keyword  = { fg = "#f9e2af", bold = true }
find_position = { fg = "#cba6f7", bg = "reset", bold = true }

marker_copied = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut    = { fg = "#f38ba8", bg = "#f38ba8" }
marker_selected = { fg = "#89b4fa", bg = "#89b4fa" }

[status]
overall = { fg = "#cdd6f4", bg = "#313244" }

mode_normal = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
mode_select = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
mode_unset  = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }

[filetype]
rules = [
    { mime = "image/*",     fg = "#a6e3a1" },
    { mime = "video/*",     fg = "#cba6f7" },
    { mime = "audio/*",     fg = "#cba6f7" },
    { mime = "application/pdf", fg = "#f38ba8" },
    { mime = "application/zip", fg = "#f9e2af" },
    { mime = "text/*",      fg = "#89b4fa" },
]
